<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta property="og:title" content="501 Original Fit Jeans">
  <meta property="og:type" content="product">
  <meta property="og:site_name" content="Levi's">
  <title>501 Original Fit Jeans - Levi's</title>
</head>
<body>
  <h1 itemprop="name">501 Original Fit Jeans</h1>
  <span itemprop="brand">Levi's</span>

  <!-- Numeric waist × length size options -->
  <div class="product-size-selector">
    <label>Waist × Length</label>
    <div class="size-buttons">
      <button type="button" class="size-btn" aria-label="28x30">28x30</button>
      <button type="button" class="size-btn" aria-label="30x30">30x30</button>
      <button type="button" class="size-btn" aria-label="30x32">30x32</button>
      <button type="button" class="size-btn" aria-label="32x30">32x30</button>
      <button type="button" class="size-btn" aria-label="32x32">32x32</button>
      <button type="button" class="size-btn" aria-label="34x30">34x30</button>
      <button type="button" class="size-btn" aria-label="34x32">34x32</button>
      <button type="button" class="size-btn" aria-label="36x32">36x32</button>
    </div>
  </div>

  <button type="button" aria-label="Add to bag" class="btn-add-to-bag">Add to bag</button>

  <div class="product-description">
    <p>Non-stretch denim. Fits true to size. Classic straight leg.</p>
    <p>100% cotton denim. Returns accepted within 30 days.</p>
  </div>

  <table class="size-chart">
    <caption>Size Chart — Waist (in)</caption>
    <thead>
      <tr><th>Size</th><th>Waist</th><th>Hip</th><th>Inseam</th></tr>
    </thead>
    <tbody>
      <tr><td>28</td><td>28"</td><td>37"</td><td>30"</td></tr>
      <tr><td>30</td><td>30"</td><td>39"</td><td>30"</td></tr>
      <tr><td>32</td><td>32"</td><td>41"</td><td>32"</td></tr>
      <tr><td>34</td><td>34"</td><td>43"</td><td>32"</td></tr>
      <tr><td>36</td><td>36"</td><td>45"</td><td>32"</td></tr>
    </tbody>
  </table>
</body>
</html>
