<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta property="og:title" content="Vintage Wash Tee">
  <meta property="og:type" content="product">
  <meta property="og:site_name" content="Local Brand">
  <title>Vintage Wash Tee - Local Brand</title>
</head>
<body>
  <!-- Product with sizes but no size chart — should still detect product and flag missing chart -->
  <h1>Vintage Wash Tee</h1>
  <span class="brand">Local Brand</span>

  <select name="size" id="size-select">
    <option value="">Select size</option>
    <option value="XS">XS</option>
    <option value="S">S</option>
    <option value="M">M</option>
    <option value="L">L</option>
  </select>

  <button name="add" type="submit">Add to cart</button>

  <div class="description">
    <p>Oversized fit. 100% cotton. This runs large, size down for a regular fit.</p>
    <p>Exchange within 14 days.</p>
  </div>
  <!-- Intentionally no size chart -->
</body>
</html>
