<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta property="og:title" content="Air Trainer Pro">
  <meta property="og:type" content="product">
  <meta property="og:site_name" content="Stride Collective">
  <meta property="product:price:amount" content="130">
  <meta property="product:price:currency" content="USD">
  <title>Air Trainer Pro - Stride Collective</title>
</head>
<body>
  <h1 itemprop="name">Air Trainer Pro</h1>
  <span itemprop="brand">Stride Collective</span>
  <span itemprop="price" content="130.00">$130</span>

  <!-- Size buttons — US half sizes -->
  <div class="product-size-selector" aria-label="size">
    <label>US Size</label>
    <div class="size-buttons">
      <button type="button" class="size-btn" aria-label="size">8</button>
      <button type="button" class="size-btn" aria-label="size">8.5</button>
      <button type="button" class="size-btn" aria-label="size">9</button>
      <button type="button" class="size-btn" aria-label="size">9.5</button>
      <button type="button" class="size-btn" aria-label="size">10</button>
      <button type="button" class="size-btn" aria-label="size">10.5 - Sold Out</button>
      <button type="button" class="size-btn" aria-label="size">11</button>
      <button type="button" class="size-btn" aria-label="size">11.5 (Out of Stock)</button>
      <button type="button" class="size-btn" aria-label="size">12</button>
    </div>
  </div>

  <button type="button" aria-label="Add to bag" class="add-to-bag">Add to bag</button>

  <div class="product-description">
    <p>These trainers run narrow — we recommend going half a size up if you have wide feet.</p>
    <p>Returns accepted within 30 days. 100% leather upper.</p>
  </div>

  <!-- Size chart: US → EU → Foot Length -->
  <table class="size-chart">
    <caption>Shoe Size Guide</caption>
    <thead>
      <tr><th>US</th><th>EU</th><th>Foot Length (cm)</th></tr>
    </thead>
    <tbody>
      <tr><td>8</td><td>41</td><td>26.0</td></tr>
      <tr><td>8.5</td><td>41.5</td><td>26.5</td></tr>
      <tr><td>9</td><td>42</td><td>27.0</td></tr>
      <tr><td>9.5</td><td>42.5</td><td>27.5</td></tr>
      <tr><td>10</td><td>43</td><td>28.0</td></tr>
      <tr><td>10.5</td><td>43.5</td><td>28.5</td></tr>
      <tr><td>11</td><td>44</td><td>29.0</td></tr>
      <tr><td>12</td><td>45</td><td>30.0</td></tr>
    </tbody>
  </table>
</body>
</html>
