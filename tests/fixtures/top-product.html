<!doctype html>
<html lang="en">
  <head>
    <title>Everlane Boxy Oxford Shirt</title>
    <meta property="og:site_name" content="Everlane">
    <meta property="og:title" content="Boxy Oxford Shirt">
    <meta name="description" content="A relaxed fit cotton oxford shirt with an oversized shape.">
  </head>
  <body>
    <main>
      <p class="brand">Everlane</p>
      <h1>Boxy Oxford Shirt</h1>
      <p>This shirt has a relaxed fit and slightly oversized body.</p>

      <label for="top-size">Select size</label>
      <select id="top-size" name="size">
        <option>Choose size</option>
        <option>XS</option>
        <option>S</option>
        <option>M</option>
        <option>L</option>
        <option>XL</option>
      </select>

      <section>
        <h2>Size chart</h2>
        <table>
          <caption>Shirt measurements</caption>
          <tr><th>Size</th><th>Chest</th><th>Length</th></tr>
          <tr><td>S</td><td>38 in</td><td>26 in</td></tr>
          <tr><td>M</td><td>40 in</td><td>27 in</td></tr>
          <tr><td>L</td><td>42 in</td><td>28 in</td></tr>
        </table>
      </section>

      <section>
        <h2>Materials</h2>
        <p>Fabric: 100% organic cotton.</p>
      </section>

      <section>
        <h2>Returns</h2>
        <p>Returns accepted within 30 days for unworn items.</p>
      </section>

      <button>Add to bag</button>
    </main>
  </body>
</html>
