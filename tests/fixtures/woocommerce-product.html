<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta property="og:title" content="Classic Slim Hoodie – Navy">
  <meta property="og:type" content="product">
  <meta property="product:brand" content="Streetwear Co">
  <title>Classic Slim Hoodie – Navy | Streetwear Co</title>
</head>
<body>
  <h1 class="product_title entry-title">Classic Slim Hoodie – Navy</h1>

  <div class="woocommerce-product-details__short-description">
    <p>Slim fit hoodie. Runs small — size up for a relaxed fit. 60% cotton, 40% polyester.</p>
  </div>

  <!-- WooCommerce variation select -->
  <table class="variations">
    <tbody>
      <tr>
        <td class="label"><label for="pa_size">Size</label></td>
        <td class="value">
          <select id="pa_size" name="attribute_pa_size" data-attribute_name="attribute_pa_size">
            <option value="">Choose an option</option>
            <option value="xs">XS</option>
            <option value="s">S</option>
            <option value="m">M</option>
            <option value="l">L</option>
            <option value="xl">XL</option>
          </select>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- WooCommerce add to cart -->
  <button type="submit" name="add-to-cart" value="123" class="single_add_to_cart_button button alt">
    Add to cart
  </button>

  <!-- Standard HTML size chart table -->
  <div class="size-chart">
    <h3>Size Guide</h3>
    <table>
      <thead>
        <tr><th>Size</th><th>Chest (in)</th><th>Length (in)</th></tr>
      </thead>
      <tbody>
        <tr><td>XS</td><td>34–36</td><td>26</td></tr>
        <tr><td>S</td><td>36–38</td><td>27</td></tr>
        <tr><td>M</td><td>38–40</td><td>28</td></tr>
        <tr><td>L</td><td>40–42</td><td>29</td></tr>
        <tr><td>XL</td><td>42–44</td><td>30</td></tr>
      </tbody>
    </table>
  </div>

  <div class="returns-policy">
    <p>Free returns within 30 days. No questions asked.</p>
  </div>
</body>
</html>
